<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock App</title>
    <style>
        /* Styles for better visibility and accessibility */
        .modal {
            display: none;
            /* Add styles for modal */
        }
        /* Add more styles */
    </style>
</head>
<body>
    <h1>Welcome to the Stock App</h1>
    <form id="stock-form">
        <label for="pant-option">Select Pant Option:</label>
        <select id="pant-option" name="pant-option">
            <option value="none">Select</option>
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
        </select>
        <button type="button" onclick="resetForm()">Reset</button>
    </form>
    <table>
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>&lt;strong&gt;Pant&lt;/strong&gt;</td>
            <td>$50</td>
        </tr>
    </table>
    <script>
        function resetForm() {
            document.getElementById('stock-form').reset();
            // Close modal if needed
        }
        // Add event listeners and other functionality to improve accessibility
    </script>
</body>
</html>
